name: Build Desktop App

on:
  workflow_dispatch:
    inputs:
      build_windows:
        description: "Build Windows version"
        type: boolean
        default: true
      build_macos:
        description: "Build macOS version"
        type: boolean
        default: true

jobs:
  build-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            arch: universal
            rust_target: x86_64-apple-darwin,aarch64-apple-darwin
            label: macOS
            enabled_input: build_macos
          - os: windows-latest
            arch: x86_64
            rust_target: x86_64-pc-windows-msvc
            label: Windows
            enabled_input: build_windows

    runs-on: ${{ matrix.os }}
    name: Build ${{ matrix.label }}

    steps:
      - name: Check if build is enabled
        id: check
        shell: bash
        run: |
          if [ "${{ matrix.label }}" = "macOS" ]; then
            echo "enabled=${{ github.event.inputs.build_macos }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ matrix.label }}" = "Windows" ]; then
            echo "enabled=${{ github.event.inputs.build_windows }}" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.check.outputs.enabled == 'true'

      - name: Setup Node.js
        if: steps.check.outputs.enabled == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: "yarn"

      - name: Install Rust stable
        if: steps.check.outputs.enabled == 'true'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Rust cache
        if: steps.check.outputs.enabled == 'true'
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.os }}
          workspaces: "src-tauri -> target"

      - name: Install frontend dependencies
        if: steps.check.outputs.enabled == 'true'
        run: yarn install

      - name: Build Tauri App (macOS Universal)
        if: steps.check.outputs.enabled == 'true' && matrix.os == 'macos-latest'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY || '' }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD || '' }}
        with:
          args: --target universal-apple-darwin

      - name: Build Tauri App (Windows)
        if: steps.check.outputs.enabled == 'true' && matrix.os == 'windows-latest'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY || '' }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD || '' }}

      - name: Upload macOS DMG
        if: steps.check.outputs.enabled == 'true' && matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: NextChat-macOS-DMG
          path: src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
          if-no-files-found: warn
          retention-days: 30

      - name: Upload Windows artifacts
        if: steps.check.outputs.enabled == 'true' && matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: NextChat-Windows
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn
          retention-days: 30
